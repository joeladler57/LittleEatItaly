<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Print Station - Little Eat Italy</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #000;
            color: #fff;
            min-height: 100vh;
            padding: 16px;
        }
        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 20px;
            font-weight: bold;
        }
        .header small {
            font-size: 11px;
            color: #888;
            display: block;
        }
        .status-box {
            padding: 16px;
            border: 2px solid #333;
            margin-bottom: 16px;
        }
        .status-box.connected {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }
        .status-box.error {
            border-color: #ef4444;
            background: rgba(239, 68, 68, 0.1);
        }
        .status-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .status-info h3 {
            font-size: 14px;
            font-weight: bold;
        }
        .status-info p {
            font-size: 11px;
            color: #888;
            font-family: monospace;
        }
        .btn {
            padding: 12px 20px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-green { background: #22c55e; color: #fff; }
        .btn-red { background: #ef4444; color: #fff; }
        .btn-gray { background: #333; color: #fff; }
        .btn:disabled { background: #555; color: #888; }
        .btn-full { width: 100%; margin-top: 12px; padding: 16px; }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            background: #111;
            padding: 24px;
            margin-bottom: 16px;
            border: 1px solid #333;
        }
        .stat { text-align: center; }
        .stat-label { font-size: 10px; color: #888; margin-bottom: 4px; }
        .stat-value { font-size: 36px; font-weight: bold; }
        .stat-value.yellow { color: #eab308; }
        .stat-value.green { color: #22c55e; }
        .main-status {
            padding: 32px;
            text-align: center;
            border: 2px solid #333;
            margin-bottom: 16px;
        }
        .main-status.ready {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }
        .main-status.printing {
            border-color: #3b82f6;
            background: rgba(59, 130, 246, 0.1);
        }
        .main-status h2 {
            font-size: 20px;
            margin-top: 12px;
        }
        .main-status p {
            font-size: 12px;
            color: #888;
            margin-top: 8px;
        }
        .icon { font-size: 48px; }
        .settings {
            margin-top: 16px;
            padding: 16px;
            background: #111;
            border: 1px solid #333;
        }
        .settings h3 {
            font-size: 14px;
            margin-bottom: 12px;
        }
        .input-group {
            margin-bottom: 12px;
        }
        .input-group label {
            font-size: 10px;
            color: #888;
            display: block;
            margin-bottom: 4px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            font-family: monospace;
            font-size: 14px;
        }
        .log {
            margin-top: 16px;
            padding: 12px;
            background: #111;
            border: 1px solid #333;
            max-height: 150px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 10px;
            color: #888;
        }
        .log-entry { margin-bottom: 4px; }
        .log-entry.success { color: #22c55e; }
        .log-entry.error { color: #ef4444; }
        .queue-item {
            background: #111;
            border: 1px solid #333;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .queue-item h4 { font-size: 18px; }
        .queue-item small { font-size: 10px; color: #888; }
        .hidden { display: none; }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .spinning { animation: spin 1s linear infinite; display: inline-block; }
    </style>
</head>
<body>
    <div class="header">
        <span style="font-size: 32px;">🖨️</span>
        <div>
            <h1>DRUCK-STATION</h1>
            <small id="restaurantName">Little Eat Italy</small>
        </div>
    </div>

    <div id="connectionBox" class="status-box">
        <div class="status-row">
            <div class="status-info">
                <h3 id="connectionStatus">DRUCKER VERBINDEN</h3>
                <p id="printerAddress">192.168.2.129:80</p>
            </div>
            <button id="connectBtn" class="btn btn-green" onclick="toggleConnection()">Verbinden</button>
        </div>
    </div>

    <div class="stats">
        <div class="stat">
            <div class="stat-label">WARTESCHLANGE</div>
            <div class="stat-value yellow" id="queueCount">0</div>
        </div>
        <div class="stat">
            <div class="stat-label">GEDRUCKT</div>
            <div class="stat-value green" id="printedCount">0</div>
        </div>
    </div>

    <div id="mainStatus" class="main-status">
        <div class="icon">🖨️</div>
        <h2 id="mainStatusText">DRUCKER VERBINDEN</h2>
        <p id="mainStatusSub">Oben auf "Verbinden" tippen</p>
    </div>

    <div id="queueList"></div>

    <button id="testPrintBtn" class="btn btn-gray btn-full" onclick="testPrint()" style="display:none;">
        🖨️ Testdruck
    </button>

    <div class="settings">
        <h3>⚙️ Einstellungen</h3>
        <div class="input-group">
            <label>DRUCKER IP-ADRESSE</label>
            <input type="text" id="printerIP" value="192.168.2.129" onchange="saveSettings()">
        </div>
        <div class="input-group">
            <label>PORT (80 für Webinterface)</label>
            <input type="number" id="printerPort" value="80" onchange="saveSettings()">
        </div>
        <div class="input-group">
            <label>BACKEND API URL</label>
            <input type="text" id="apiUrl" value="https://thermal-print-10.preview.emergentagent.com/api" onchange="saveSettings()">
        </div>
    </div>

    <div class="log" id="logBox">
        <div class="log-entry">Print Station bereit...</div>
    </div>

    <script>
        // State
        let isConnected = false;
        let isPrinting = false;
        let printedCount = 0;
        let printQueue = [];
        let pollInterval = null;
        let settings = null;

        // Load settings from localStorage
        function loadSettings() {
            const savedIP = localStorage.getItem('printer_ip');
            const savedPort = localStorage.getItem('printer_port') || '80';
            const savedAPI = localStorage.getItem('api_url');
            
            if (savedIP) document.getElementById('printerIP').value = savedIP;
            document.getElementById('printerPort').value = savedPort;
            if (savedAPI) document.getElementById('apiUrl').value = savedAPI;
            
            updatePrinterAddress();
        }

        function saveSettings() {
            localStorage.setItem('printer_ip', document.getElementById('printerIP').value);
            localStorage.setItem('printer_port', document.getElementById('printerPort').value);
            localStorage.setItem('api_url', document.getElementById('apiUrl').value);
            updatePrinterAddress();
            log('Einstellungen gespeichert');
        }

        function updatePrinterAddress() {
            const ip = document.getElementById('printerIP').value;
            const port = document.getElementById('printerPort').value;
            document.getElementById('printerAddress').textContent = `${ip}:${port}`;
        }

        function log(message, type = '') {
            const logBox = document.getElementById('logBox');
            const entry = document.createElement('div');
            entry.className = 'log-entry ' + type;
            entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
            logBox.insertBefore(entry, logBox.firstChild);
            if (logBox.children.length > 50) {
                logBox.removeChild(logBox.lastChild);
            }
        }

        function toggleConnection() {
            if (isConnected) {
                disconnect();
            } else {
                connect();
            }
        }

        function connect() {
            isConnected = true;
            document.getElementById('connectionBox').classList.add('connected');
            document.getElementById('connectionStatus').textContent = 'DRUCKER BEREIT';
            document.getElementById('connectBtn').textContent = 'Trennen';
            document.getElementById('connectBtn').className = 'btn btn-red';
            document.getElementById('testPrintBtn').style.display = 'block';
            updateMainStatus();
            log('Drucker verbunden', 'success');
            
            // Start polling for print jobs
            fetchShopSettings();
            startPolling();
        }

        function disconnect() {
            isConnected = false;
            stopPolling();
            document.getElementById('connectionBox').classList.remove('connected');
            document.getElementById('connectionStatus').textContent = 'DRUCKER VERBINDEN';
            document.getElementById('connectBtn').textContent = 'Verbinden';
            document.getElementById('connectBtn').className = 'btn btn-green';
            document.getElementById('testPrintBtn').style.display = 'none';
            updateMainStatus();
            log('Drucker getrennt');
        }

        function updateMainStatus() {
            const mainStatus = document.getElementById('mainStatus');
            const mainText = document.getElementById('mainStatusText');
            const mainSub = document.getElementById('mainStatusSub');
            
            mainStatus.className = 'main-status';
            
            if (!isConnected) {
                mainText.innerHTML = '🖨️ DRUCKER VERBINDEN';
                mainSub.textContent = 'Oben auf "Verbinden" tippen';
            } else if (isPrinting) {
                mainStatus.classList.add('printing');
                mainText.innerHTML = '<span class="spinning">⏳</span> DRUCKT...';
                mainSub.textContent = '';
            } else if (printQueue.length > 0) {
                mainText.innerHTML = `🖨️ ${printQueue.length} BON(S) WARTEN`;
                mainSub.textContent = 'Automatischer Druck aktiv';
            } else {
                mainStatus.classList.add('ready');
                mainText.innerHTML = '✅ BEREIT';
                mainSub.textContent = 'Warte auf Bestellungen...';
            }
        }

        async function fetchShopSettings() {
            try {
                const apiUrl = document.getElementById('apiUrl').value;
                const response = await fetch(`${apiUrl}/shop/settings`);
                settings = await response.json();
                if (settings.restaurant_name) {
                    document.getElementById('restaurantName').textContent = settings.restaurant_name;
                }
                log('Shop-Einstellungen geladen');
            } catch (e) {
                log('Fehler beim Laden der Einstellungen: ' + e.message, 'error');
            }
        }

        function startPolling() {
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(fetchPrintQueue, 3000);
            fetchPrintQueue();
        }

        function stopPolling() {
            if (pollInterval) {
                clearInterval(pollInterval);
                pollInterval = null;
            }
        }

        async function fetchPrintQueue() {
            if (!isConnected) return;
            
            try {
                const apiUrl = document.getElementById('apiUrl').value;
                const response = await fetch(`${apiUrl}/print-queue/pending`);
                const jobs = await response.json();
                
                const prevCount = printQueue.length;
                printQueue = jobs;
                
                document.getElementById('queueCount').textContent = printQueue.length;
                
                // Play sound if new job
                if (printQueue.length > prevCount && prevCount >= 0) {
                    playSound();
                }
                
                // Auto-print first job
                if (printQueue.length > 0 && !isPrinting) {
                    await processPrintJob(printQueue[0]);
                }
                
                renderQueue();
                updateMainStatus();
                
            } catch (e) {
                // Silent fail - backend might be unavailable
            }
        }

        function renderQueue() {
            const container = document.getElementById('queueList');
            container.innerHTML = '';
            
            printQueue.forEach(job => {
                const div = document.createElement('div');
                div.className = 'queue-item';
                div.innerHTML = `
                    <div>
                        <h4>#${job.order_number}</h4>
                        <small>${new Date(job.created_at).toLocaleTimeString()}</small>
                    </div>
                    <button class="btn btn-green" onclick="manualPrint('${job.id}')">Drucken</button>
                `;
                container.appendChild(div);
            });
        }

        function manualPrint(jobId) {
            const job = printQueue.find(j => j.id === jobId);
            if (job) processPrintJob(job);
        }

        function playSound() {
            try {
                const audio = new Audio('data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQoGAACBhYqFbF1fdJivrJBhNjVgodDbq2EcBj+a2teleRg1TYyh1K5WARlQoMfbqGIlPnOLrdKvYCAzVIS11bZnJDNYeaXGs3Y0QlhuobSqd0xPW2mEm56Sd1NVYnCAjI2EeWVhZ3B4fnyAgoGEhIKBgYOEhYWEhIOCgoKCgoKBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgYGBgX5+');
                audio.play();
            } catch (e) {}
        }

        async function testPrint() {
            const testOrder = {
                order_number: 'TEST',
                customer_name: 'Test Kunde',
                customer_phone: '0176 12345678',
                pickup_time: 'JETZT',
                created_at: new Date().toISOString(),
                items: [
                    { quantity: 2, item_name: 'Margherita', size_name: 'Gross', total_price: 21.80 },
                    { quantity: 1, item_name: 'Calzone', size_name: null, total_price: 12.50, options: [{option_name: 'Extra Kaese'}, {option_name: 'Pilze'}] },
                    { quantity: 3, item_name: 'Cola', size_name: '0.5L', total_price: 8.70 }
                ],
                total: 43.00,
                notes: 'Bitte gut durchbacken!',
                payment_method: 'Kartenzahlung'
            };
            
            isPrinting = true;
            updateMainStatus();
            log('Sende Testdruck...');
            
            const success = await printReceipt(testOrder);
            if (success) {
                printedCount++;
                document.getElementById('printedCount').textContent = printedCount;
                log('Testdruck erfolgreich!', 'success');
            }
            
            isPrinting = false;
            updateMainStatus();
        }

        async function processPrintJob(job) {
            if (isPrinting) return;
            
            isPrinting = true;
            updateMainStatus();
            log(`Drucke Bon #${job.order_number}...`);
            
            try {
                const orderData = job.order_data || job;
                const success = await printReceipt(orderData);
                
                if (success) {
                    // Mark as completed in backend
                    try {
                        const apiUrl = document.getElementById('apiUrl').value;
                        await fetch(`${apiUrl}/print-queue/${job.id}/status`, {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ status: 'completed' })
                        });
                    } catch (e) {}
                    
                    printedCount++;
                    document.getElementById('printedCount').textContent = printedCount;
                    log(`Bon #${job.order_number} gedruckt!`, 'success');
                    
                    // Remove from local queue
                    printQueue = printQueue.filter(j => j.id !== job.id);
                    document.getElementById('queueCount').textContent = printQueue.length;
                    renderQueue();
                } else {
                    log(`Druckfehler bei #${job.order_number}`, 'error');
                }
            } catch (e) {
                log(`Fehler: ${e.message}`, 'error');
            } finally {
                isPrinting = false;
                updateMainStatus();
            }
        }

        function escapeXML(str) {
            if (!str) return '';
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        }

        function buildReceiptXML(order) {
            // Get template settings
            const template = settings?.receipt_template || {};
            const header = template.header || {};
            const orderInfo = template.order_info || {};
            const itemsCfg = template.items || {};
            const notesCfg = template.notes || {};
            const totalsCfg = template.totals || {};
            const footerCfg = template.footer || {};
            
            let body = '';

            // ========== HEADER ==========
            body += `<text align="center"/>`;
            
            // Restaurant Name
            if (header.show_restaurant_name !== false) {
                if (header.restaurant_name_bold !== false) {
                    body += `<text em="true"/>`;
                }
                if (header.restaurant_name_size === 'large') {
                    body += `<text width="2" height="2"/>`;
                } else if (header.restaurant_name_size === 'medium') {
                    body += `<text width="1" height="2"/>`;
                }
                body += `<text>${escapeXML(settings?.restaurant_name || 'Little Eat Italy')}&#10;</text>`;
                body += `<text width="1" height="1"/>`;
                body += `<text em="false"/>`;
            }

            // Address
            if (header.show_address !== false && settings?.restaurant_address) {
                body += `<text>${escapeXML(settings.restaurant_address)}&#10;</text>`;
            }
            
            // Phone
            if (header.show_phone !== false && settings?.restaurant_phone) {
                body += `<text>Tel: ${escapeXML(settings.restaurant_phone)}&#10;</text>`;
            }

            // Separator
            if (header.show_separator !== false) {
                body += `<text>--------------------------------&#10;</text>`;
            }

            // ========== ORDER INFO ==========
            
            // Order Number
            if (orderInfo.show_order_number !== false) {
                body += `<text align="center"/>`;
                if (orderInfo.order_number_bold !== false) {
                    body += `<text em="true"/>`;
                }
                if (orderInfo.order_number_size === 'large') {
                    body += `<text width="2" height="2"/>`;
                } else if (orderInfo.order_number_size === 'medium') {
                    body += `<text width="1" height="2"/>`;
                }
                body += `<text>#${escapeXML(String(order.order_number || '?'))}&#10;</text>`;
                body += `<text width="1" height="1"/>`;
                body += `<text em="false"/>`;
            }

            // Date/Time
            if (orderInfo.show_date_time !== false) {
                body += `<text align="center"/>`;
                const date = new Date(order.created_at);
                body += `<text>${date.toLocaleDateString('de-DE')} ${date.toLocaleTimeString('de-DE', {hour: '2-digit', minute: '2-digit'})}&#10;</text>`;
            }

            body += `<text align="left"/>`;
            
            // Customer Name
            if (orderInfo.show_customer_name !== false && order.customer_name) {
                if (orderInfo.customer_name_bold) {
                    body += `<text em="true"/>`;
                }
                body += `<text>Kunde: ${escapeXML(order.customer_name)}&#10;</text>`;
                body += `<text em="false"/>`;
            }

            // Customer Phone
            if (orderInfo.show_customer_phone !== false && order.customer_phone) {
                body += `<text>Tel: ${escapeXML(order.customer_phone)}&#10;</text>`;
            }

            // Pickup Time - HIGHLIGHTED
            if (orderInfo.show_pickup_time !== false) {
                body += `<feed unit="24"/>`;
                body += `<text align="center"/>`;
                if (orderInfo.pickup_time_bold !== false) {
                    body += `<text em="true"/>`;
                }
                if (orderInfo.pickup_time_size === 'large') {
                    body += `<text width="2" height="2"/>`;
                } else if (orderInfo.pickup_time_size === 'medium') {
                    body += `<text width="1" height="2"/>`;
                }
                body += `<text>================&#10;</text>`;
                const pickupTime = order.confirmed_pickup_time || order.pickup_time || 'N/A';
                body += `<text>ABHOLUNG: ${escapeXML(pickupTime)}&#10;</text>`;
                body += `<text>================&#10;</text>`;
                body += `<text width="1" height="1"/>`;
                body += `<text em="false"/>`;
            }

            // Separator before items
            if (orderInfo.show_separator !== false) {
                body += `<text align="left"/>`;
                body += `<text>--------------------------------&#10;</text>`;
            }

            // ========== ITEMS ==========
            body += `<text align="left"/>`;
            
            for (const item of (order.items || [])) {
                // Build item line
                let itemLine = '';
                if (itemsCfg.show_quantity !== false) {
                    itemLine += (item.quantity || 1) + 'x ';
                }
                itemLine += (item.item_name || '');
                if (itemsCfg.show_size !== false && item.size_name) {
                    itemLine += ' (' + item.size_name + ')';
                }
                
                // Item name styling
                if (itemsCfg.item_name_bold) {
                    body += `<text em="true"/>`;
                }
                
                // Price
                if (itemsCfg.show_item_price !== false) {
                    const price = (item.total_price || 0).toFixed(2) + 'E';
                    const spaces = Math.max(1, 32 - itemLine.length - price.length);
                    body += `<text>${escapeXML(itemLine)}${' '.repeat(spaces)}${price}&#10;</text>`;
                } else {
                    body += `<text>${escapeXML(itemLine)}&#10;</text>`;
                }
                body += `<text em="false"/>`;

                // Options/Extras
                if (itemsCfg.show_options !== false && item.options && item.options.length > 0) {
                    const opts = item.options.map(o => o.option_name || o.name || String(o)).join(', ');
                    body += `<text>  + ${escapeXML(opts)}&#10;</text>`;
                }
            }

            // Separator after items
            if (itemsCfg.show_separator !== false) {
                body += `<text>--------------------------------&#10;</text>`;
            }

            // ========== NOTES ==========
            if (notesCfg.show_notes !== false && order.notes) {
                if (notesCfg.notes_bold) {
                    body += `<text em="true"/>`;
                }
                if (notesCfg.notes_box) {
                    body += `<text>================================&#10;</text>`;
                }
                body += `<text>* ${escapeXML(order.notes)}&#10;</text>`;
                if (notesCfg.notes_box) {
                    body += `<text>================================&#10;</text>`;
                }
                body += `<text em="false"/>`;
            }

            // ========== TOTALS ==========
            if (totalsCfg.show_total !== false) {
                if (totalsCfg.total_bold !== false) {
                    body += `<text em="true"/>`;
                }
                if (totalsCfg.total_size === 'large') {
                    body += `<text height="2"/>`;
                }
                const totalLine = 'GESAMT:';
                const totalPrice = (order.total || 0).toFixed(2) + 'E';
                const spaces = Math.max(1, 32 - totalLine.length - totalPrice.length);
                body += `<text>${totalLine}${' '.repeat(spaces)}${totalPrice}&#10;</text>`;
                body += `<text height="1"/>`;
                body += `<text em="false"/>`;
            }

            // Payment Method
            if (totalsCfg.show_payment_method !== false && order.payment_method) {
                body += `<text>Zahlung: ${escapeXML(order.payment_method)}&#10;</text>`;
            }

            // Separator
            if (totalsCfg.show_separator !== false) {
                body += `<text>--------------------------------&#10;</text>`;
            }

            // ========== FOOTER ==========
            body += `<text align="center"/>`;
            
            if (footerCfg.show_thank_you !== false) {
                body += `<text>${escapeXML(footerCfg.thank_you_text || 'Vielen Dank!')}&#10;</text>`;
            }

            if (footerCfg.show_custom_text && footerCfg.custom_text) {
                body += `<text>${escapeXML(footerCfg.custom_text)}&#10;</text>`;
            }

            // Feed and cut
            body += `<feed unit="100"/>`;
            body += `<cut type="feed"/>`;

            // Wrap in SOAP envelope
            let xml = `<?xml version="1.0" encoding="UTF-8"?>
<s:Envelope xmlns:s="http://schemas.xmlsoap.org/soap/envelope/">
<s:Body>
<epos-print xmlns="http://www.epson-pos.com/schemas/2011/03/epos-print">
${body}
</epos-print>
</s:Body>
</s:Envelope>`;

            return xml;
        }

        function printReceipt(order) {
            return new Promise((resolve) => {
                const ip = document.getElementById('printerIP').value;
                const port = document.getElementById('printerPort').value;
                const url = `http://${ip}:${port}/cgi-bin/epos/service.cgi?devid=local_printer&timeout=10000`;
                const xml = buildReceiptXML(order);
                
                log('Sende an Drucker...');
                
                const xhr = new XMLHttpRequest();
                xhr.open('POST', url, true);
                xhr.setRequestHeader('Content-Type', 'application/xml; charset=UTF-8');
                xhr.timeout = 15000;
                
                xhr.onload = function() {
                    if (xhr.status >= 200 && xhr.status < 300) {
                        if (xhr.responseText.includes('success="false"')) {
                            const errorMatch = xhr.responseText.match(/code="([^"]+)"/);
                            const errorCode = errorMatch ? errorMatch[1] : 'Unbekannt';
                            log('Drucker Fehler: ' + errorCode, 'error');
                            resolve(false);
                        } else {
                            log('Erfolgreich gedruckt!', 'success');
                            resolve(true);
                        }
                    } else {
                        log('HTTP Fehler: ' + xhr.status, 'error');
                        resolve(false);
                    }
                };
                
                xhr.onerror = function() {
                    log('Netzwerk-Fehler', 'error');
                    resolve(false);
                };
                
                xhr.ontimeout = function() {
                    log('Timeout - keine Antwort', 'error');
                    resolve(false);
                };
                
                xhr.send(xml);
            });
        }

        // Initialize
        loadSettings();
    </script>
</body>
</html>
